version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./agentgateway.db
      - SECRET_KEY=your-secret-key-here
      - ANTHROPIC_API_KEY=your-anthropic-api-key-here
    volumes:
      - .:/app
    command: python -m uvicorn backend.app:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: npm run dev
    depends_on:
      - backend
